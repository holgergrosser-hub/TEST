<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QM Assistent</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; line-height: 1.4; }
      h1 { margin: 0 0 12px; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; max-width: 820px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; margin: 12px 0; }
      a.button { display: inline-block; padding: 10px 14px; border-radius: 8px; border: 1px solid #222; color: #111; text-decoration: none; }
      a.button:hover { background: #f5f5f5; }
      input { padding: 10px 12px; border-radius: 8px; border: 1px solid #bbb; min-width: 260px; }
      button { padding: 10px 14px; border-radius: 8px; border: 1px solid #222; background: #fff; cursor: pointer; }
      button:hover { background: #f5f5f5; }
      .muted { color: #555; }
      .result { padding: 12px 0; border-top: 1px solid #eee; }
      .tag { display: inline-block; border: 1px solid #ddd; border-radius: 999px; padding: 2px 8px; margin-right: 6px; font-size: 12px; }
      .small { font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>QM Assistent</h1>
      <div class="muted">Schnellzugriff: Termin vereinbaren, Angebot anfragen, FAQ.</div>

      <div class="row">
        <a class="button" href="https://calendly.com/grosser-qmguru/termin-qm-system-iso-9001" target="_blank" rel="noreferrer">
          Termin (ISO 9001) buchen
        </a>
        <a class="button" href="https://angebot.qmberater.info/" target="_blank" rel="noreferrer">
          Online-Angebot anfragen
        </a>
      </div>

      <h2>FAQ / Wissensdatenbank</h2>
      <div class="row">
        <input id="q" type="text" placeholder="Frage eingeben (z. B. 'Angebot', 'Termin')" />
        <button id="search">Suchen</button>
      </div>
      <div id="status" class="muted small"></div>
      <div id="results"></div>

      <div class="muted small" style="margin-top: 14px;">
        Hinweis: Diese Seite ist statisch (Netlify). Der Chat-Agent selbst läuft separat (lokal via ADK Web oder gehostet).
      </div>
    </div>

    <script>
      let kb = [];

      function normalize(text) {
        return (text || "").toString().trim().toLowerCase();
      }

      function score(entry, query) {
        const haystack = normalize(`${entry.question || ""} ${entry.answer || ""} ${(entry.tags || []).join(" ")}`);
        if (!haystack) return 0;
        if (haystack.includes(query)) return 1;
        // small, simple score: token overlap
        const tokens = query.split(/\s+/).filter(Boolean);
        const hit = tokens.filter(t => haystack.includes(t)).length;
        return Math.min(0.95, hit / Math.max(1, tokens.length));
      }

      function render(matches) {
        const results = document.getElementById('results');
        results.innerHTML = "";

        if (matches.length === 0) {
          results.innerHTML = '<div class="muted">Keine Treffer gefunden.</div>';
          return;
        }

        for (const m of matches) {
          const div = document.createElement('div');
          div.className = 'result';
          const tags = Array.isArray(m.tags) ? m.tags : [];
          div.innerHTML = `
            <div class="small muted">Score: ${m.score.toFixed(2)}</div>
            <div><strong>${m.question || ""}</strong></div>
            <div>${m.answer || ""}</div>
            <div style="margin-top: 6px;">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          `;
          results.appendChild(div);
        }
      }

      async function loadKb() {
        const status = document.getElementById('status');
        status.textContent = 'Lade Wissensdatenbank…';
        try {
          const res = await fetch('./knowledge_base.json', { cache: 'no-store' });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          if (!Array.isArray(data)) throw new Error('knowledge_base.json muss eine Liste sein');
          kb = data;
          status.textContent = `Wissensdatenbank geladen (${kb.length} Einträge).`;
        } catch (e) {
          status.textContent = `Konnte Wissensdatenbank nicht laden: ${e.message}`;
          kb = [];
        }
      }

      function runSearch() {
        const query = normalize(document.getElementById('q').value);
        if (!query) {
          render([]);
          return;
        }
        const matches = kb
          .map(entry => ({
            question: entry.question,
            answer: entry.answer,
            tags: entry.tags,
            score: score(entry, query)
          }))
          .filter(x => x.score > 0)
          .sort((a, b) => b.score - a.score)
          .slice(0, 5);

        render(matches);
      }

      document.getElementById('search').addEventListener('click', runSearch);
      document.getElementById('q').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') runSearch();
      });

      loadKb();
    </script>
  </body>
</html>
